name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Default binaries — SIMD-accelerated by default via blake3 v0.4.0's go-asmgen
  # kernels (no GOEXPERIMENT, no cgo): NEON/SSE on arm64/amd64, LSX/RVV on
  # loong64/riscv64. The loong64/riscv64 vector assembly needs Go 1.25+, so the
  # whole matrix builds on the latest stable Go.
  stable:
    name: stable ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: loong64 }
          - { goos: linux,   goarch: riscv64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          ext=""; [ "$GOOS" = windows ] && ext=".exe"
          out="b3sum-${{ github.ref_name }}-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/b3sum
          echo "ART=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}

  # Alternative SIMD build using Go's experimental archsimd intrinsics (amd64
  # AVX2, GOEXPERIMENT=simd, Go 1.26+) — a different implementation from the
  # default go-asmgen kernels above, kept for comparison. Bit-identical output.
  simd-experimental:
    name: simd-experimental linux/amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Build (GOEXPERIMENT=simd)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
          GOEXPERIMENT: simd
        run: |
          out="b3sum-${{ github.ref_name }}-linux-amd64-simd-experimental"
          go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/b3sum
          echo "ART=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}
