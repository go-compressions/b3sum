name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native lint + build + test with the 100% coverage gate on internal/b3sum.
  # amd64 and arm64 run on real hardware (the blake3 dependency carries SIMD
  # paths for both).
  native:
    name: lint + build + test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true
      - run: go vet ./...
      - run: go build ./cmd/b3sum
      - name: test + coverage gate (100% on internal/b3sum)
        run: |
          go test -race -coverpkg=./internal/... -coverprofile=cover.out ./...
          go tool cover -func=cover.out
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "internal/b3sum coverage: ${pct}%"
          awk "BEGIN{ exit !(${pct} >= 100.0) }" || { echo "coverage ${pct}% < 100.0%"; exit 1; }

  # Cross-compile the test binary and run it under QEMU for the remaining four
  # 64-bit targets that the blake3 SIMD backend covers. blake3 is big-endian
  # correct, so s390x must pass too. Same 100% gate as the native jobs.
  emulated:
    name: build + test (${{ matrix.arch }}, qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie",                qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie",                qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie",                qemu: "qemu" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: cross-compile test binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
            go test -c -cover -coverpkg=./internal/... -o /tmp/b3sum.test ./internal/b3sum
      - name: run test binary under qemu
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t ${{ matrix.image }} \
            /t/b3sum.test -test.v -test.coverprofile=/t/cover.out
      - name: coverage gate (100% on internal/b3sum)
        run: |
          go tool cover -func=/tmp/cover.out
          pct=$(go tool cover -func=/tmp/cover.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "internal/b3sum coverage: ${pct}%"
          awk "BEGIN{ exit !(${pct} >= 100.0) }" || { echo "coverage ${pct}% < 100.0%"; exit 1; }

  simd:
    name: experimental SIMD (amd64, GOEXPERIMENT=simd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      # Build and test the experimental SIMD build of the BLAKE3 dependency on a
      # real AVX2 runner. Not held to the 100% gate (the native jobs above are).
      - name: Test + build under GOEXPERIMENT=simd
        env:
          GOEXPERIMENT: simd
        run: |
          go vet ./...
          go test -race ./...
          go build ./cmd/b3sum
